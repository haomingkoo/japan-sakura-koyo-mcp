<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Japan Sakura & Koyo Forecast — Cherry Blossom & Autumn Leaves</title>
  <meta name="description" content="Real-time cherry blossom and autumn leaves forecast for Japan. 1,700+ spots with live bloom data on an interactive map.">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --pink: #ec4899; --pink-light: #fdf2f8; --pink-dark: #be185d;
      --orange: #ea580c; --orange-light: #fff7ed;
      --green: #059669; --green-light: #ecfdf5;
      --gray-50: #fafafa; --gray-100: #f5f5f5; --gray-200: #e5e5e5;
      --gray-400: #a3a3a3; --gray-600: #525252; --gray-800: #262626;
      --radius: 12px;
    }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; color: var(--gray-800); background: var(--gray-50); }

    /* ── Layout ── */
    .app { display: flex; flex-direction: column; height: 100vh; }
    .top-bar {
      display: flex; align-items: center; justify-content: space-between;
      padding: 12px 20px; background: white; border-bottom: 1px solid var(--gray-200);
      flex-shrink: 0; gap: 12px; flex-wrap: wrap;
    }
    .top-bar h1 { font-size: 1.15rem; font-weight: 700; white-space: nowrap; }
    .main { display: flex; flex: 1; overflow: hidden; }
    .map-container { flex: 1; position: relative; }
    #map { width: 100%; height: 100%; }
    .sidebar {
      width: 380px; overflow-y: auto; background: white;
      border-left: 1px solid var(--gray-200); flex-shrink: 0;
    }

    /* ── Controls ── */
    .controls { display: flex; gap: 6px; align-items: center; flex-wrap: wrap; }
    .mode-btn {
      padding: 6px 14px; border: 1px solid var(--gray-200); border-radius: 20px;
      background: white; cursor: pointer; font-size: 0.82rem; font-weight: 500;
      color: var(--gray-600); transition: all 0.2s; white-space: nowrap;
    }
    .mode-btn.active { background: var(--pink); color: white; border-color: var(--pink); }
    .mode-btn.koyo.active { background: var(--orange); color: white; border-color: var(--orange); }
    .mode-btn:hover:not(.active) { border-color: var(--gray-400); }
    .date-input {
      padding: 5px 10px; border: 1px solid var(--gray-200); border-radius: 8px;
      font-size: 0.82rem; background: white;
    }
    .find-btn {
      padding: 5px 14px; background: var(--pink); color: white;
      border: none; border-radius: 8px; cursor: pointer; font-size: 0.82rem; font-weight: 500;
    }

    /* ── Sidebar content ── */
    .sidebar-header {
      padding: 16px; border-bottom: 1px solid var(--gray-200);
      position: sticky; top: 0; background: white; z-index: 1;
    }
    .sidebar-header h2 { font-size: 1rem; margin-bottom: 2px; }
    .sidebar-header p { font-size: 0.8rem; color: var(--gray-600); }
    .sidebar-content { padding: 0; }

    .spot-item {
      padding: 12px 16px; border-bottom: 1px solid var(--gray-100);
      cursor: pointer; transition: background 0.15s;
    }
    .spot-item:hover { background: var(--gray-50); }
    .spot-item h4 { font-size: 0.88rem; margin-bottom: 3px; }
    .spot-item .sub { font-size: 0.78rem; color: var(--gray-600); }

    /* ── Bloom bar ── */
    .bloom-row { display: flex; align-items: center; gap: 6px; margin-top: 4px; }
    .bloom-label { font-size: 0.72rem; color: var(--gray-400); width: 52px; }
    .bloom-track { flex: 1; height: 14px; background: var(--gray-100); border-radius: 7px; overflow: hidden; }
    .bloom-fill {
      height: 100%; border-radius: 7px; display: flex; align-items: center;
      justify-content: flex-end; padding-right: 4px;
      font-size: 0.65rem; font-weight: 600; color: white; min-width: 24px;
    }
    .bloom-fill.b { background: linear-gradient(90deg, #f9a8d4, #ec4899); }
    .bloom-fill.f { background: linear-gradient(90deg, #f472b6, #be185d); }

    /* ── Badge ── */
    .badge {
      display: inline-block; padding: 1px 8px; border-radius: 10px;
      font-size: 0.7rem; font-weight: 500;
    }
    .badge.peak { background: #fce7f3; color: #be185d; }
    .badge.bloom { background: #fdf2f8; color: #ec4899; }
    .badge.soon { background: #ecfdf5; color: #059669; }
    .badge.ended { background: var(--gray-100); color: var(--gray-400); }

    /* ── Legend ── */
    .legend {
      position: absolute; bottom: 20px; left: 20px; z-index: 1000;
      background: white; padding: 10px 14px; border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.15); font-size: 0.75rem;
    }
    .legend-row { display: flex; align-items: center; gap: 6px; margin: 3px 0; }
    .legend-dot { width: 12px; height: 12px; border-radius: 50%; }

    /* ── Loading ── */
    .loading { padding: 40px; text-align: center; color: var(--gray-400); }

    /* ── Footer link ── */
    .footer-link {
      padding: 16px; text-align: center; font-size: 0.75rem; color: var(--gray-400);
      border-top: 1px solid var(--gray-200);
    }
    .footer-link a { color: var(--gray-600); }

    /* ── Mobile ── */
    @media (max-width: 768px) {
      .main { flex-direction: column; }
      .map-container { height: 50vh; }
      .sidebar { width: 100%; height: 50vh; border-left: none; border-top: 1px solid var(--gray-200); }
      .top-bar h1 { font-size: 1rem; }
    }
  </style>
</head>
<body>

<div class="app">
  <div class="top-bar">
    <h1>Japan Sakura & Koyo</h1>
    <div class="controls">
      <button class="mode-btn active" id="btn-sakura" onclick="setMode('sakura')">Cherry Blossom</button>
      <button class="mode-btn koyo" id="btn-koyo" onclick="setMode('koyo')">Autumn Leaves</button>
      <span style="color:var(--gray-200)">|</span>
      <input type="date" class="date-input" id="date-start">
      <span style="font-size:0.8rem;color:var(--gray-400)">to</span>
      <input type="date" class="date-input" id="date-end">
      <button class="find-btn" onclick="findBestDates()">Find</button>
    </div>
  </div>

  <div class="main">
    <div class="map-container">
      <div id="map"></div>
      <div class="legend" id="legend"></div>
    </div>
    <div class="sidebar">
      <div class="sidebar-header" id="sidebar-header">
        <h2>Loading...</h2>
        <p>Select a region on the map or browse below</p>
      </div>
      <div class="sidebar-content" id="sidebar-content">
        <div class="loading">Loading forecast data...</div>
      </div>
      <div class="footer-link">
        Data: <a href="https://n-kishou.com">Japan Meteorological Corp</a> &middot;
        MCP: <code>sakura.kooexperience.com/mcp</code><br>
        <a href="https://github.com/haomingkoo/japan-sakura-koyo-mcp">GitHub</a> &middot;
        <a href="https://www.npmjs.com/package/japan-sakura-koyo-mcp">npm</a>
      </div>
    </div>
  </div>
</div>

<script>
// ── State ──
let mode = 'sakura';
let sakuraData = null;
let mapInstance = null;
let markers = [];

// ── Map setup ──
function initMap() {
  mapInstance = L.map('map', { zoomControl: false }).setView([36.5, 137.5], 6);
  L.control.zoom({ position: 'topright' }).addTo(mapInstance);
  L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
    attribution: '&copy; OpenStreetMap &copy; CARTO',
    maxZoom: 18,
  }).addTo(mapInstance);
}

// ── Helpers ──
const $ = id => document.getElementById(id);
async function api(path) {
  const r = await fetch(path);
  if (!r.ok) throw new Error(`Error: ${r.status}`);
  return r.json();
}
function fmtDate(iso) {
  if (!iso) return '—';
  const d = new Date(iso);
  return `${d.getMonth()+1}/${d.getDate()}`;
}

// ── Color by bloom rate ──
function sakuraColor(bloomRate, fullRate) {
  if (fullRate >= 90) return '#be185d';   // full bloom — deep pink
  if (fullRate >= 40) return '#ec4899';   // half+ bloom — pink
  if (fullRate > 0) return '#f9a8d4';    // starting bloom — light pink
  if (bloomRate >= 85) return '#86efac';  // buds opening — green
  if (bloomRate >= 60) return '#bbf7d0';  // buds swelling — light green
  return '#e5e5e5';                       // dormant — gray
}

function sakuraRadius(bloomRate, fullRate) {
  if (fullRate >= 90) return 9;
  if (fullRate > 0) return 7;
  if (bloomRate > 0) return 5;
  return 4;
}

function statusText(status) {
  if (status.includes('Full bloom') || status.includes('mankai') || status.includes('best')) return { text: status.split('—')[0].trim(), cls: 'peak' };
  if (status.includes('bloom') || status.includes('Bloom') || status.includes('咲き')) return { text: status.split('—')[0].trim(), cls: 'bloom' };
  if (status.includes('Coming') || status.includes('soon') || status.includes('つぼみ') || status.includes('Bud')) return { text: status.split('—')[0].trim(), cls: 'soon' };
  return { text: status.split('—')[0].trim(), cls: 'ended' };
}

// ── Mode switching ──
function setMode(m) {
  mode = m;
  $('btn-sakura').classList.toggle('active', m === 'sakura');
  $('btn-koyo').classList.toggle('active', m === 'koyo');
  if (m === 'sakura') loadSakura();
  if (m === 'koyo') loadKoyo();
}

// ── SAKURA ──
async function loadSakura() {
  $('sidebar-header').innerHTML = '<h2>Cherry Blossom Forecast</h2><p>48 cities &middot; 1,012 spots across Japan</p>';
  $('sidebar-content').innerHTML = '<div class="loading">Loading...</div>';
  updateLegend('sakura');

  try {
    if (!sakuraData) sakuraData = await api('/api/sakura/forecast');
    clearMarkers();

    // Add city markers to map
    for (const region of sakuraData.regions) {
      for (const city of region.cities) {
        // We need lat/lon — use prefCode to load spots
        // For now, show cities in sidebar; map loads when prefecture selected
      }
    }

    // Render sidebar with regions
    let html = '';
    for (const region of sakuraData.regions) {
      html += `<div style="padding:12px 16px;background:var(--gray-50);font-weight:600;font-size:0.85rem;border-bottom:1px solid var(--gray-200)">${region.nameEn}</div>`;
      for (const city of region.cities) {
        const st = statusText(city.status);
        html += `<div class="spot-item" onclick="loadPrefSpots('${city.prefCode}', '${city.prefName}')">
          <h4>${city.cityName} <span style="font-weight:400;color:var(--gray-400)">${city.prefName}</span></h4>
          <div class="sub">
            <span class="badge ${st.cls}">${st.text}</span>
            &nbsp; Bloom: ${fmtDate(city.bloom.forecast)}${city.bloom.observation ? ' → '+fmtDate(city.bloom.observation) : ''}
            &nbsp; Full: ${fmtDate(city.fullBloom.forecast)}${city.fullBloom.observation ? ' → '+fmtDate(city.fullBloom.observation) : ''}
          </div>
        </div>`;
      }
    }
    $('sidebar-content').innerHTML = html;
  } catch (e) {
    $('sidebar-content').innerHTML = `<div class="loading" style="color:#dc2626">${e.message}</div>`;
  }
}

async function loadPrefSpots(prefCode, prefName) {
  $('sidebar-header').innerHTML = `<h2>${prefName} Spots</h2><p>Loading...</p>`;
  $('sidebar-content').innerHTML = '<div class="loading">Loading spots...</div>';

  try {
    const data = await api(`/api/sakura/spots?pref=${prefCode}`);
    clearMarkers();

    // Add spots to map
    const bounds = [];
    for (const spot of data.spots) {
      if (!spot.lat || !spot.lon) continue;
      const color = sakuraColor(spot.bloomRate, spot.fullRate);
      const radius = sakuraRadius(spot.bloomRate, spot.fullRate);
      const marker = L.circleMarker([spot.lat, spot.lon], {
        radius, fillColor: color, color: 'white', weight: 1.5,
        fillOpacity: 0.9,
      }).addTo(mapInstance);
      marker.bindPopup(`<b>${spot.name}</b><br>Bloom: ${spot.bloomRate}% &middot; Full: ${spot.fullRate}%<br>${spot.status}`);
      markers.push(marker);
      bounds.push([spot.lat, spot.lon]);
    }
    if (bounds.length) mapInstance.fitBounds(bounds, { padding: [30, 30] });

    // Sidebar
    $('sidebar-header').innerHTML = `
      <div style="display:flex;justify-content:space-between;align-items:center">
        <div><h2>${prefName}</h2><p>${data.spots.length} spots</p></div>
        <button onclick="loadSakura()" style="border:1px solid var(--gray-200);background:white;padding:4px 12px;border-radius:6px;cursor:pointer;font-size:0.8rem">&larr; Back</button>
      </div>`;

    let html = '';
    if (data.jmaStation) {
      const jma = data.jmaStation;
      html += `<div class="spot-item" style="background:var(--pink-light)">
        <h4>JMA Station: ${jma.name}</h4>
        <div class="bloom-row"><span class="bloom-label">Bloom</span><div class="bloom-track"><div class="bloom-fill b" style="width:${Math.min(jma.bloomRate,100)}%">${jma.bloomRate}%</div></div></div>
        <div class="bloom-row"><span class="bloom-label">Full bloom</span><div class="bloom-track"><div class="bloom-fill f" style="width:${Math.min(jma.fullRate,100)}%">${jma.fullRate}%</div></div></div>
      </div>`;
    }
    for (const spot of data.spots) {
      html += `<div class="spot-item" onclick="flyToSpot(${spot.lat},${spot.lon},'${spot.name.replace(/'/g,"\\'")}',${spot.bloomRate},${spot.fullRate},'${spot.status.replace(/'/g,"\\'")}')">
        <h4>${spot.name}</h4>
        <div class="bloom-row"><span class="bloom-label">Bloom</span><div class="bloom-track"><div class="bloom-fill b" style="width:${Math.min(spot.bloomRate,100)}%">${spot.bloomRate}%</div></div></div>
        <div class="bloom-row"><span class="bloom-label">Full</span><div class="bloom-track"><div class="bloom-fill f" style="width:${Math.min(spot.fullRate,100)}%">${spot.fullRate}%</div></div></div>
        <div class="sub" style="margin-top:4px">Bloom: ${fmtDate(spot.bloomForecast)} → Full: ${fmtDate(spot.fullBloomForecast)}</div>
      </div>`;
    }
    $('sidebar-content').innerHTML = html;
  } catch (e) {
    $('sidebar-content').innerHTML = `<div class="loading" style="color:#dc2626">${e.message}</div>`;
  }
}

function flyToSpot(lat, lon, name, bloomRate, fullRate, status) {
  mapInstance.flyTo([lat, lon], 14, { duration: 0.8 });
  L.popup().setLatLng([lat, lon])
    .setContent(`<b>${name}</b><br>Bloom: ${bloomRate}% &middot; Full: ${fullRate}%<br>${status}`)
    .openOn(mapInstance);
}

// ── KOYO ──
async function loadKoyo() {
  $('sidebar-header').innerHTML = '<h2>Autumn Leaves Forecast</h2><p>687 spots across Japan</p>';
  $('sidebar-content').innerHTML = '<div class="loading">Loading...</div>';
  updateLegend('koyo');
  clearMarkers();

  try {
    const data = await api('/api/koyo/forecast');
    let html = '';
    for (const region of data.regions) {
      html += `<div style="padding:12px 16px;background:var(--orange-light);font-weight:600;font-size:0.85rem;border-bottom:1px solid var(--gray-200)">${region.name}</div>`;
      for (const city of region.cities) {
        const mapleDate = city.maple ? fmtDate(city.maple.forecast) : '—';
        const ginkgoDate = city.ginkgo ? fmtDate(city.ginkgo.forecast) : '—';
        const prefCode = city.code.slice(0, 2);
        html += `<div class="spot-item" onclick="loadKoyoSpots('${prefCode}','${city.prefName || city.name}')">
          <h4>${city.name} <span style="font-weight:400;color:var(--gray-400)">${city.prefName || ''}</span></h4>
          <div class="sub">Maple: ${mapleDate}${city.maple ? ' · '+city.maple.normalDiffClass : ''} &nbsp; Ginkgo: ${ginkgoDate}</div>
        </div>`;
      }
    }
    $('sidebar-content').innerHTML = html;
  } catch (e) {
    $('sidebar-content').innerHTML = `<div class="loading" style="color:#dc2626">${e.message}</div>`;
  }
}

async function loadKoyoSpots(prefCode, name) {
  $('sidebar-header').innerHTML = `<h2>${name} Spots</h2><p>Loading...</p>`;
  try {
    const data = await api(`/api/koyo/spots?pref=${prefCode}`);
    clearMarkers();
    const bounds = [];
    for (const spot of data.spots) {
      if (!spot.lat || !spot.lon) continue;
      const color = spot.status.includes('Peak') ? '#ea580c' : spot.status.includes('Turning') ? '#fdba74' : '#e5e5e5';
      const marker = L.circleMarker([spot.lat, spot.lon], {
        radius: 7, fillColor: color, color: 'white', weight: 1.5, fillOpacity: 0.9,
      }).addTo(mapInstance);
      marker.bindPopup(`<b>${spot.name}</b><br>${spot.status}<br>Peak: ${fmtDate(spot.bestPeak)}`);
      markers.push(marker);
      bounds.push([spot.lat, spot.lon]);
    }
    if (bounds.length) mapInstance.fitBounds(bounds, { padding: [30, 30] });

    $('sidebar-header').innerHTML = `
      <div style="display:flex;justify-content:space-between;align-items:center">
        <div><h2>${name}</h2><p>${data.spots.length} spots</p></div>
        <button onclick="loadKoyo()" style="border:1px solid var(--gray-200);background:white;padding:4px 12px;border-radius:6px;cursor:pointer;font-size:0.8rem">&larr; Back</button>
      </div>`;

    let html = '';
    for (const spot of data.spots) {
      const stars = spot.popularity > 0 ? '★'.repeat(spot.popularity) : '';
      html += `<div class="spot-item" onclick="flyToSpot(${spot.lat},${spot.lon},'${spot.name.replace(/'/g,"\\'")}',0,0,'${spot.status.replace(/'/g,"\\'")}')">
        <h4>${spot.name} ${stars ? '<span style="color:#ea580c">'+stars+'</span>' : ''}</h4>
        <div class="sub">${spot.leafType} &middot; Peak: <strong>${fmtDate(spot.bestPeak)}</strong> (${fmtDate(spot.bestStart)} → ${fmtDate(spot.bestEnd)})</div>
      </div>`;
    }
    $('sidebar-content').innerHTML = html;
  } catch (e) {
    $('sidebar-content').innerHTML = `<div class="loading" style="color:#dc2626">${e.message}</div>`;
  }
}

// ── Find Best Dates ──
async function findBestDates() {
  const start = $('date-start').value;
  const end = $('date-end').value;
  if (!start || !end) { alert('Pick both dates'); return; }

  $('sidebar-header').innerHTML = `<h2>Best for ${start} to ${end}</h2><p>Searching...</p>`;
  $('sidebar-content').innerHTML = '<div class="loading">Finding blooms...</div>';

  try {
    const data = await api(`/api/sakura/best?start=${start}&end=${end}`);
    if (!data.matches?.length) {
      $('sidebar-header').innerHTML = `<h2>No blooms found</h2><p>${start} to ${end}</p>`;
      $('sidebar-content').innerHTML = `<div class="loading">No cities in bloom during these dates.<br><br>Season: Okinawa Jan-Feb, Kyushu/Kansai late Mar, Kanto early Apr, Tohoku mid Apr, Hokkaido late Apr-May.</div>`;
      return;
    }

    $('sidebar-header').innerHTML = `<h2>${data.matches.length} cities in bloom</h2><p>${start} to ${end}</p>`;
    let html = '';
    for (const city of data.matches) {
      const st = statusText(city.status);
      html += `<div class="spot-item" onclick="loadPrefSpots('${city.prefCode}','${city.prefName}')">
        <h4>${city.cityName} <span style="font-weight:400;color:var(--gray-400)">${city.prefName}</span></h4>
        <div class="sub">
          <span class="badge ${st.cls}">${st.text}</span>
          &nbsp; Full bloom: ${fmtDate(city.fullBloom.forecast)}${city.fullBloom.observation ? ' → '+fmtDate(city.fullBloom.observation) : ''}
        </div>
      </div>`;
    }
    $('sidebar-content').innerHTML = html;
  } catch (e) {
    $('sidebar-content').innerHTML = `<div class="loading" style="color:#dc2626">${e.message}</div>`;
  }
}

// ── Map helpers ──
function clearMarkers() {
  markers.forEach(m => mapInstance.removeLayer(m));
  markers = [];
}

function updateLegend(type) {
  if (type === 'sakura') {
    $('legend').innerHTML = `
      <div style="font-weight:600;margin-bottom:4px">Bloom Status</div>
      <div class="legend-row"><div class="legend-dot" style="background:#be185d"></div> Full bloom (mankai)</div>
      <div class="legend-row"><div class="legend-dot" style="background:#ec4899"></div> Blooming</div>
      <div class="legend-row"><div class="legend-dot" style="background:#f9a8d4"></div> Starting</div>
      <div class="legend-row"><div class="legend-dot" style="background:#86efac"></div> Buds opening</div>
      <div class="legend-row"><div class="legend-dot" style="background:#bbf7d0"></div> Buds swelling</div>
      <div class="legend-row"><div class="legend-dot" style="background:#e5e5e5"></div> Dormant</div>`;
  } else {
    $('legend').innerHTML = `
      <div style="font-weight:600;margin-bottom:4px">Leaf Status</div>
      <div class="legend-row"><div class="legend-dot" style="background:#ea580c"></div> Peak colors</div>
      <div class="legend-row"><div class="legend-dot" style="background:#fdba74"></div> Turning</div>
      <div class="legend-row"><div class="legend-dot" style="background:#e5e5e5"></div> Not yet / ended</div>`;
  }
}

// ── Init ──
const today = new Date().toISOString().slice(0,10);
const nextWeek = new Date(Date.now()+7*86400000).toISOString().slice(0,10);
$('date-start').value = today;
$('date-end').value = nextWeek;
initMap();
loadSakura();
</script>
</body>
</html>
